<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>কাজ চলমান - Maintenance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'SolaimanLipi', sans-serif;
        }
        .maintenance-card {
            max-width: 600px;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .gear-icon {
            font-size: 50px;
            color: #ffc107;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="maintenance-card mx-auto">
            <div class="gear-icon">⚙️</div>
            
            <h1 class="fw-bold text-dark mb-4">
                এই পেইজটির কাজ চলমান, এই পেইজ এখনো পূর্ণ হয়নি
            </h1>

            <p class="lead text-secondary">
                এই পেইজের ব্যাকএন্ড ও সার্ভার ইঞ্জিনের কাজ চলমান। আমরা সাইটটিকে আপনার জন্য আরও উন্নত করার চেষ্টা করছি।
            </p>

            <div class="alert alert-warning mt-4 border-0 shadow-sm" role="alert">
                <strong>⚠️ সতর্কতা:</strong> দয়া করে ধৈর্য ধরুন, এবং আমাকে ধীরে স্থীরে কাজ করার সুযোগ দিন।
            </div>

            <hr class="my-4">
            <p class="text-muted">ধন্যবাদ</p>
            
            <a href="index_2.html" class="btn btn-primary btn-sm mt-2">ফিরে যান</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
