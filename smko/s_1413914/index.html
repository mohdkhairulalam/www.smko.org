<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000b18; /* ডার্ক ব্যাকগ্রাউন্ড যাতে বর্ডারটি ফুটে ওঠে */
            font-family: 'Segoe UI', sans-serif;
        }

        /* মেইন কার্ড কন্টেইনার */
        .login-box {
            position: relative;
            width: 400px;
            height: auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* বাইরের অংশ লুকানোর জন্য */
            backdrop-filter: blur(15px);
        }

        /* ঘুরন্ত বর্ডার লাইন তৈরির ম্যাজিক */
        .login-box::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            /* সোনালি, নেভি ব্লু এবং পিংক গ্রেডিয়েন্ট */
            background-image: conic-gradient(transparent, transparent, transparent, #FFD700, #000080, #FF1493);
            animation: rotateBorder 4s linear infinite;
        }

        /* কার্ডের ভেতরের অংশ যা বর্ডারের ওপর বসে বর্ডারটিকে চিকন দেখাবে */
        .login-box::after {
            content: '';
            position: absolute;
            inset: 4px; /* বর্ডার কতটুকু চিকন হবে তা এখান থেকে ঠিক করা যায় */
            background: #000b18; 
            background: rgba(10, 20, 30, 0.8); /* গ্লাস ইফেক্ট ধরে রাখার জন্য */
            border-radius: 16px;
            z-index: 1;
        }

        @keyframes rotateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ফরম কন্টেন্ট যা বর্ডারের উপরে থাকবে */
        .content {
            position: relative;
            z-index: 2; /* বর্ডারের উপরে রাখার জন্য */
            padding: 40px;
            width: 100%;
            color: white;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: none;
            border-color: #FFD700;
            color: white;
        }

        .btn-custom {
            background: linear-gradient(45deg, #FFD700, #FF1493);
            border: none;
            font-weight: bold;
            color: #000;
        }

        .btn-custom:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="login-box">
    <div class="content">
        <h2 class="text-center mb-4">Login for Super Admin</h2>
<form id="loginForm" action="your_login_process.php" method="POST" onsubmit="return validateForm()">
    <div class="mb-3">
        <label class="form-label">Email</label>
        <!-- PHP এর জন্য name="email" যুক্ত করা হয়েছে এবং id দেওয়া হয়েছে -->
        <input type="email" name="email" id="email" class="form-control" placeholder="example@mail.com">
        <div id="emailError" style="color: #ff4d4d; font-size: 0.8rem; margin-top: 5px;"></div>
    </div>
    <div class="mb-4">
        <label class="form-label">Password</label>
        <!-- PHP এর জন্য name="password" যুক্ত করা হয়েছে এবং id দেওয়া হয়েছে -->
        <input type="password" name="password" id="password" class="form-control" placeholder="••••••••">
        <div id="passError" style="color: #ff4d4d; font-size: 0.8rem; margin-top: 5px;"></div>
    </div>
    <div class="d-grid">
        <button type="submit" name="login_submit" class="btn btn-custom">Login</button>
    </div>
    <div class="text-center mt-3">
        <small>Forgot password? <a href="#" class="text-info text-decoration-none">Reset here</a></small>
    </div>
</form>
</div>
</div>


<script>
function validateForm() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let emailError = document.getElementById("emailError");
    let passError = document.getElementById("passError");
    let isValid = true;

    // মেসেজ ক্লিয়ার করা
    emailError.innerHTML = "";
    passError.innerHTML = "";

    // ইমেইল ভ্যালিডেশন (খালি কি না এবং ফরম্যাট ঠিক আছে কি না)
    let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (email === "") {
        emailError.innerHTML = "দয়া করে আপনার সঠিক ইমেইল দিন";
        isValid = false;
    } else if (!emailPattern.test(email)) {
        emailError.innerHTML = "দয়া করে একটি সঠিক ইমেইল অ্যাড্রেস লিখুন।";
        isValid = false;
    }

    // পাসওয়ার্ড ভ্যালিডেশন (খালি কি না)
    if (password === "") {
        passError.innerHTML = "দয়া করে আপনার সঠিক পাসওয়ার্ড দিন";
        isValid = false;
    } else if (password.length < 6) {
        passError.innerHTML = "পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে।";
        isValid = false;
    }

    return isValid; // false হলে ফরম সাবমিট হবে না
}
</script>
</body>
</html>
